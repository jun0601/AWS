Outputs:     #각 EC2 Public&Private IP 추출
  ELBEC21:
    Description: ELBEC21
    Value: !GetAtt ELBEc21.PublicIp
  ELBEC22:
    Description: ELBEC22
    Value: !GetAtt ELBEc22.PublicIp
  MyEC2:
    Description: MyEC21
    Value: !GetAtt MyEc2.PublicIp