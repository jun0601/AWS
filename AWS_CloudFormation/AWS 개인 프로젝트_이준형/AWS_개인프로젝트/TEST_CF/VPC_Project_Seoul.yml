Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: must be the name of an existing EC2 KeyPair.
  LatestAmiId:
    Description: (DO NOT CHANGE)
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'
    AllowedValues:
      - /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64 

Resources:
############################################################Seoul VPC 환경 세팅###########################################################
  SeoulVPC:     #Seoul 가상 네트워크 공간 생성
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: 10.1.0.0/16
      Tags:
        - Key: Name
          Value: Seoul-VPC
          
  SeoulVPCIGW:     #Seoul VPC를 인터넷과 연결하는 출입문
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Seoul-IGW
          
  SeoulIGWAttachment:     #SeoulIGW를 SeoulVPC에 실제로 연결
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref SeoulVPCIGW
      VpcId: !Ref SeoulVPC
  
  SeoulPublicSN1:     #Public 서브넷1 생성
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]     #현재 리전의 첫 번째 AZ 목록 반환 (가용 영역 A)
      CidrBlock: 10.1.1.0/24
      Tags:
        - Key: Name
          Value: Seoul-Public-SN1

  SeoulPublicSN2:     #Public 서브넷2 생성
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]     #현재 리전의 세 번째 AZ 목록 반환 (가용 영역 C)
      CidrBlock: 10.1.2.0/24
      Tags:
        - Key: Name
          Value: Seoul-Public-SN2
          
  SeoulPrivateSN1:     #Private 서브넷1 생성
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]     #현재 리전의 첫 번째 AZ 목록 반환 (가용 영역 A)
      CidrBlock: 10.1.3.0/24
      Tags:
        - Key: Name
          Value: Seoul-Private-SN1

  SeoulPrivateSN2:     #Private 서브넷2 생성
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]     #현재 리전의 세 번째 AZ 목록 반환 (가용 영역 C)
      CidrBlock: 10.1.4.0/24
      Tags:
        - Key: Name
          Value: Seoul-Private-SN2
          
  SeoulPrivateSN3:     #Private 서브넷3 생성   -> TGW 연결용임 
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]     #현재 리전의 첫 번째 AZ 목록 반환 (가용 영역 A)
      CidrBlock: 10.1.5.0/24
      Tags:
        - Key: Name
          Value: Seoul-Private-SN3
          
  SeoulPrivateSN4:     #Private 서브넷4 생성   -> TGW 연결용임 
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]     #현재 리전의 세 번째 AZ 목록 반환 (가용 영역 C)
      CidrBlock: 10.1.6.0/24
      Tags:
        - Key: Name
          Value: Seoul-Private-SN4

  SeoulPublicRT:     #퍼블릭용 라우팅 테이블 생성
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SeoulVPC
      Tags:
        - Key: Name
          Value: Seoul-Public-RT
          
  DefaultPublicRoute:     #퍼블릭 RT에 기본 인터넷 경로 추가
    Type: AWS::EC2::Route
    DependsOn: SeoulIGWAttachment     #SeoulIGWAttachment 먼저 생성된 후 만들어지도록 순서 지정해주는 부분
    Properties:
      RouteTableId: !Ref SeoulPublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref SeoulVPCIGW
      
  SeoulPrivateRT1:     #프라이빗 서브넷용 라우팅 테이블1
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SeoulVPC
      Tags:
        - Key: Name
          Value: Seoul-Private-RT1
          
  AWStoIDCRoute1:     # AWS VPC에서 IDC 대역으로 가는 트래픽을 TGW로 라우팅
    Type: AWS::EC2::Route
    DependsOn: TransitGatewayAtt1
    Properties:
      RouteTableId: !Ref SeoulPrivateRT1
      DestinationCidrBlock: 10.2.0.0/16
      TransitGatewayId: !Ref TransitGateway1     #TGW 
          
  SeoulPrivateRT2:     #프라이빗 서브넷용 라우팅 테이블2
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SeoulVPC
      Tags:
        - Key: Name
          Value: Seoul-Private-RT2    
          
  AWStoIDCRoute2:     # AWS VPC에서 IDC 대역으로 가는 트래픽을 TGW로 라우팅
    Type: AWS::EC2::Route
    DependsOn: TransitGatewayAtt1
    Properties:
      RouteTableId: !Ref SeoulPrivateRT2
      DestinationCidrBlock: 10.2.0.0/16
      TransitGatewayId: !Ref TransitGateway1     #TGW 
          
  SeoulPrivateRT3:     #연동용 프라이빗 서브넷용 라우팅 테이블3
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SeoulVPC
      Tags:
        - Key: Name
          Value: Seoul-Private-RT3    


  
  SeoulPublicRTAssociation1:     #Public 서브넷1을 Public 라우팅 테이블에 연결
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref SeoulPublicRT
      SubnetId: !Ref SeoulPublicSN1
      
  SeoulPublicRTAssociation2:     #Public 서브넷2을 Public 라우팅 테이블에 연결
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref SeoulPublicRT
      SubnetId: !Ref SeoulPublicSN2
      
  SeoulPrivateTAssociation1:     #Private 서브넷1을 Private 라우팅 테이블에 연결
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref SeoulPrivateRT1
      SubnetId: !Ref SeoulPrivateSN1
      
  SeoulPrivateTAssociation2:     #Private 서브넷2을 Private 라우팅 테이블에 연결
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref SeoulPrivateRT2
      SubnetId: !Ref SeoulPrivateSN2
      
  SeoulPrivateTAssociation3:     #Private 서브넷3을 연동용 Private 라우팅 테이블에 연결
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref SeoulPrivateRT3
      SubnetId: !Ref SeoulPrivateSN3
      
  SeoulPrivateTAssociation4:     #Private 서브넷4을 연동용 Private 라우팅 테이블에 연결
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref SeoulPrivateRT3
      SubnetId: !Ref SeoulPrivateSN4
      
  SeoulVPCSG:     #보안그룹 하나 생성
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SeoulVPCSG
      VpcId: !Ref SeoulVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: '80'
          ToPort: '80'
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: '53'
          ToPort: '53'
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: '53'
          ToPort: '53'
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp     #icmp는 포트가 없으므로 지정 안함
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  SeoulPublicEC21:     #Public EC2 인스턴스 생성 1
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: Seoul-Public-EC21
      NetworkInterfaces:     #ENI를 정의하는 구조
        - DeviceIndex: 0
          SubnetId: !Ref SeoulPublicSN1
          GroupSet:
            - !Ref SeoulVPCSG
          AssociatePublicIpAddress: true     #공인IP할당
          
  SeoulPublicEC22:     #Public EC2 인스턴스 생성 2
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: Seoul-Public-EC22
      NetworkInterfaces:     #ENI를 정의하는 구조
        - DeviceIndex: 0
          SubnetId: !Ref SeoulPublicSN2
          GroupSet:
            - !Ref SeoulVPCSG
          AssociatePublicIpAddress: true     #공인IP할당
          
  SeoulPrivateEC21:     #Private EC2 인스턴스 생성 1 
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: Seoul-Private-EC21
      NetworkInterfaces:     #ENI를 정의하는 구조
        - DeviceIndex: 0
          SubnetId: !Ref SeoulPrivateSN1
          GroupSet:
            - !Ref SeoulVPCSG
          PrivateIpAddress: 10.1.3.100     # 사설 IP 직접 할당 
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            (
            echo "qwe123"
            echo "qwe123"
            ) | passwd --stdin root
            sed -i "s/^PasswordAuthentication no/PasswordAuthentication yes/g" /etc/ssh/sshd_config     #SSH 비밀번호 로그인 허용
            sed -i "s/^#PermitRootLogin prohibit-password/PermitRootLogin yes/g" /etc/ssh/sshd_config     #root 계정 SSH 로그인 허용
            service sshd restart     #SSH 서비스 재시작
            hostnamectl --static set-hostname Seoul-AWS-WebSrv1     #서버 hostname을 Seoul-AWS-WebSrv1로 변경
            cat <<EOT > /etc/profile.d/prompt.sh     #쉘 프롬프트 색상 및 형식 설정
            export PS1="[\[\e[1;31m\]\u\[\e[m\]@\[\e[1;32m\]\h\[\e[m\]: \[\e[1;36m\]\w\[\e[m\]]#"
            EOT
            source /etc/profile
            TOKEN=$(curl -sS -X PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")     #EC2 메타데이터 접근용 토큰 생성 (IMDSv2)
            RZAZ=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone-id)     #EC2의 Availability Zone ID 조회
            IID=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)     #EC2 Instance ID 조회
            LIP=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/local-ipv4)     #EC2 Private IP 조회
            dnf install -y httpd php htop tmux     #Apache 웹서버 & PHP 실행 & 시스템 모니터링 & 터미널 세션관리 패키지 설치
            systemctl start httpd && systemctl enable httpd     #Apache 웹서버 실행 + 부팅 시 자동 실행
            echo "<h1>RegionAz($RZAZ) : Instance ID($IID) : Private IP($LIP) : Main Web-JHLEE</h1>" > /var/www/html/index.html     #index.html 웹페이지 생성 
            
            cat <<'EOF' > /root/pingchecker.sh    #pingchecker.sh 생성 
            #!/bin/bash
            HOST_TO_CHECK=10.2.1.100

            if ping -qc 20 -W 1 $HOST_TO_CHECK >/dev/null; then
                echo "IDC-DB $HOST_TO_CHECK is up"
                systemctl start httpd
            else
                echo "IDC-DB $HOST_TO_CHECK is down"
                systemctl stop httpd
            fi
            EOF
            
            chmod +x /root/pingchecker.sh
                      
            dnf install -y httpd     # 1. Apache 설치 및 시작
            systemctl enable --now httpd
          
            dnf install -y https://rpms.remirepo.net/enterprise/remi-release-9.rpm      # # 2. PHP 7.4 설치 (remi 레포지토리 활용)
            dnf module reset php -y
            dnf module enable php:remi-7.4 -y
            dnf install -y php php-cli php-common php-fpm php-mysqlnd php-mbstring

            systemctl restart httpd            # 3. 서비스 재시작
            systemctl enable --now php-fpm
            
            
            #echo "* * * * * root /root/pingchecker.sh" >> /etc/crontab     #1분마다 체크하도록 crontab
            
  SeoulPrivateEC22:     #Private EC2 인스턴스 생성 2
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: Seoul-Private-EC22
      NetworkInterfaces:     #ENI를 정의하는 구조
        - DeviceIndex: 0
          SubnetId: !Ref SeoulPrivateSN2
          GroupSet:
            - !Ref SeoulVPCSG
          PrivateIpAddress: 10.1.4.100     # 사설 IP 직접 할당 
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            (
            echo "qwe123"
            echo "qwe123"
            ) | passwd --stdin root
            sed -i "s/^PasswordAuthentication no/PasswordAuthentication yes/g" /etc/ssh/sshd_config     #SSH 비밀번호 로그인 허용
            sed -i "s/^#PermitRootLogin prohibit-password/PermitRootLogin yes/g" /etc/ssh/sshd_config     #root 계정 SSH 로그인 허용
            service sshd restart     #SSH 서비스 재시작
            hostnamectl --static set-hostname Seoul-AWS-WebSrv2     #서버 hostname을 Seoul-AWS-WebSrv1로 변경
            cat <<EOT > /etc/profile.d/prompt.sh     #쉘 프롬프트 색상 및 형식 설정
            export PS1="[\[\e[1;31m\]\u\[\e[m\]@\[\e[1;32m\]\h\[\e[m\]: \[\e[1;36m\]\w\[\e[m\]]#"
            EOT
            source /etc/profile
            TOKEN=$(curl -sS -X PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")     #EC2 메타데이터 접근용 토큰 생성 (IMDSv2)
            RZAZ=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone-id)     #EC2의 Availability Zone ID 조회
            IID=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)     #EC2 Instance ID 조회
            LIP=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/local-ipv4)     #EC2 Private IP 조회
            dnf install -y httpd php htop tmux     #Apache 웹서버 & PHP 실행 & 시스템 모니터링 & 터미널 세션관리 패키지 설치
            systemctl start httpd && systemctl enable httpd     #Apache 웹서버 실행 + 부팅 시 자동 실행
            echo "<h1>RegionAz($RZAZ) : Instance ID($IID) : Private IP($LIP) : Main Web-JHLEE</h1>" > /var/www/html/index.html     #index.html 웹페이지 생성 
            
            cat <<'EOF' > /root/pingchecker.sh    #pingchecker.sh 생성 
            #!/bin/bash
            HOST_TO_CHECK=10.2.1.100

            if ping -qc 20 -W 1 $HOST_TO_CHECK >/dev/null; then
                echo "IDC-DB $HOST_TO_CHECK is up"
                systemctl start httpd
            else
                echo "IDC-DB $HOST_TO_CHECK is down"
                systemctl stop httpd
            fi
            EOF
            
            chmod +x /root/pingchecker.sh
            
            #echo "* * * * * root /root/pingchecker.sh" >> /etc/crontab     #1분마다 체크하도록 crontab
############################################################Seoul VPC 환경 세팅###########################################################
 
############################################################Seoul IDC 환경 세팅###########################################################
  IDCVPC:     #IDC 가상 네트워크 공간 생성
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: 10.2.0.0/16
      Tags:
        - Key: Name
          Value: IDC-VPC
          
  IDCIGW:     #IDC VPC를 인터넷과 연결하는 출입문
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: IDC-IGW
          
  IDCIGWAttachment:     #IDCIGW를 SeoulVPC에 실제로 연결
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref IDCIGW
      VpcId: !Ref IDCVPC
  
  IDCSN1:     #IDC 서브넷1 생성
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref IDCVPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]     #현재 리전의 첫 번째 AZ 목록 반환 (가용 영역 A)
      CidrBlock: 10.2.1.0/24
      Tags:
        - Key: Name
          Value: IDC-Public-SN

  IDCRT:     #IDC 라우팅 테이블 생성
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref IDCVPC
      Tags:
        - Key: Name
          Value: IDC-RT
          
  IDCRoute:     #IDC RT에 기본 인터넷 경로 추가
    Type: AWS::EC2::Route
    DependsOn: IDCIGWAttachment     #IDCIGWAttachment 먼저 생성된 후 만들어지도록 순서 지정해주는 부분
    Properties:
      RouteTableId: !Ref IDCRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IDCIGW 
          
  # IDCToAWSRoute1:     # IDC Private1 -> AWS 라우팅    CGW 라우팅 경로 진행 VPN
    # Type: AWS::EC2::Route
    # DependsOn: IDCCGW 
    # Properties:
      # RouteTableId: !Ref IDCRT
      # DestinationCidrBlock: 10.2.0.0/16
      # NetworkInterfaceId: !Ref IDCCGWENI
              
  
  IDCRTAssociation1:     #Public 서브넷1을 Public 라우팅 테이블에 연결
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref IDCRT
      SubnetId: !Ref IDCSN1
      
  IDCVPCSG:     #보안그룹 하나 생성
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: IDCVPCSG
      VpcId: !Ref IDCVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: '80'
          ToPort: '80'
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: '53'
          ToPort: '53'
          CidrIp: 0.0.0.0/0
        - IpProtocol: udp
          FromPort: '53'
          ToPort: '53'
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: '3306'
          ToPort: '3306'
          CidrIp: 10.1.0.0/16  # Seoul VPC 대역에서 오는 MySQL 접속 허용
        - IpProtocol: icmp     #icmp는 포트가 없으므로 지정 안함
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
          
  IDCDNSSRV:     #IDCDNSSRV 인스턴스 생성 
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: IDC-DNSSRV
      NetworkInterfaces:     #ENI를 정의하는 구조
        - DeviceIndex: 0
          SubnetId: !Ref IDCSN1
          AssociatePublicIpAddress: true     #공인IP할당
          GroupSet:
            - !Ref IDCVPCSG
          PrivateIpAddress: 10.2.1.200     # 사설 IP 직접 할당 
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            dnf install -y bind bind-utils
            sed -i 's/listen-on port 53 { 127.0.0.1; };/listen-on port 53 { any; };/' /etc/named.conf
            sed -i 's/allow-query     { localhost; };/allow-query     { any; };/' /etc/named.conf
            sed -i 's/dnssec-enable yes/dnssec-enable no/g' /etc/named.conf
            sed -i 's/dnssec-validation yes/dnssec-validation no/g' /etc/named.conf
            cat << EOF >> /etc/named.rfc1912.zones
            zone "idcseoul.internal" IN {
                type master;
                file "idcseoul.internal.zone";
                allow-update { none; };
            };
            zone "awsseoul.internal" {
                type forward;
                forward only;
                forwarders { 10.1.3.250; 10.1.4.250; };
            };
            EOF
            cat <<EOF > /var/named/idcseoul.internal.zone
            \$TTL 300
            @       IN      SOA     ns1.idcseoul.internal. admin.idcseoul.internal. (
                                    2026031101 ; Serial
                                    3600       ; Refresh
                                    1800       ; Retry
                                    604800     ; Expire
                                    300 )      ; Minimum TTL
                    IN      NS      ns1.idcseoul.internal.
            ns1     IN      A       10.2.1.200
            dbsrv  IN      A       10.2.1.100
            dnssrv  IN      A       10.2.1.200
            EOF
            systemctl enable --now named
            
