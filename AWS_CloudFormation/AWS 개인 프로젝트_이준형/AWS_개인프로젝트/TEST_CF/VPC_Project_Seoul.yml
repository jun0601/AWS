############################################################Seoul IDC 환경 세팅##########################################################
 
 ########################################NAT 구성           
  NATGateWay1:     #Private Subnet의 인스턴스가 인터넷으로 나갈 수 있도록 NAT 게이트웨이 설치 
    Type: AWS::EC2::NatGateway
    DependsOn: EIP1
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId     #EIP에 할당된 IP를 할당해줌(publicip가 아닌 할당된 ip)
      SubnetId: !Ref SeoulPublicSN1
      Tags:
        - Key: Name
          Value: NAT-Gateway1
          
  EIP1:     #탄력적 IP 할당 NAT1 용
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      
  NATRoute1:     #Private에 연결된 라우팅 테이블에 route 설정 1
    Type: AWS::EC2::Route
    DependsOn: SeoulIGWAttachment
    Properties:
      RouteTableId: !Ref SeoulPrivateRT1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateWay1
      
  NATGateWay2:     #Private Subnet의 인스턴스가 인터넷으로 나갈 수 있도록 NAT 게이트웨이 설치 
    Type: AWS::EC2::NatGateway
    DependsOn: EIP2
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId     #EIP에 할당된 IP를 할당해줌(publicip가 아닌 할당된 ip)
      SubnetId: !Ref SeoulPublicSN2
      Tags:
        - Key: Name
          Value: NAT-Gateway2
          
  EIP2:     #탄력적 IP 할당 NAT2용 
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc      
      
  NATRoute2:     #Private에 연결된 라우팅 테이블에 route 설정 2
    Type: AWS::EC2::Route
    DependsOn: SeoulIGWAttachment
    Properties:
      RouteTableId: !Ref SeoulPrivateRT2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateWay2


######################################## ALB 구성 
  ALB:     #ALB 생성 
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties: 
      Name: AWS-ALB
      Scheme: internet-facing
      SecurityGroups:
        - !Ref SeoulVPCSG
      Subnets:
        - !Ref SeoulPublicSN1
        - !Ref SeoulPublicSN2      

  ALBTG:     # ALB 대상 그룹
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: ALB-TG
      Port: 80
      Protocol: HTTP
      HealthCheckIntervalSeconds: 10
      HealthCheckTimeoutSeconds: 5        # 헬스체크 요청 후 응답을 기다리는 최대 시간 (기본값 5초)
      HealthyThresholdCount: 2            # 정상 상태로 판단하기 위해 연속 성공해야 하는 헬스체크 횟수 (기본값 2회)
      UnhealthyThresholdCount: 2          # 비정상 상태로 판단하기 위해 연속 실패해야 하는 헬스체크 횟수 (기본값 2회)
      VpcId: !Ref SeoulVPC
      Targets:
        - Id: !Ref SeoulPrivateEC21
          Port: 80
        - Id: !Ref SeoulPrivateEC22
          Port: 80
          
  ALBListener:     # ALB 리스너 생성
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTG
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      
######################################## DNS 설정 
  DNS1:     #호스트존 생성
    Type: AWS::Route53::HostedZone
    DependsOn: SeoulVPC
    Properties:
      HostedZoneConfig:
        Comment: hosted zone for seoul.internal
      Name: awsseoul.internal
      VPCs:
        - VPCId: !Ref SeoulVPC
          VPCRegion: ap-northeast-2
      HostedZoneTags:
        - Key: Name
          Value: awsnetadomain
          
  DNSRecordInstance1:     #EC21 설정 
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref DNS1
      Comment: DNS name for Seoul WEBSERV1 instance
      Name: websrv1.awsseoul.internal
      Type: A
      TTL: 60
      ResourceRecords:
        - !GetAtt SeoulPrivateEC21.PrivateIp
        
  DNSRecordInstance2:     #EC22 설정 
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref DNS1
      Comment: DNS name for Seoul WEBSERV2 instance
      Name: websrv2.awsseoul.internal
      Type: A
      TTL: 60
      ResourceRecords:
        - !GetAtt SeoulPrivateEC22.PrivateIp

  InboundEP:     #인바운드 설정 
    Type: AWS::Route53Resolver::ResolverEndpoint
    Properties:
      Direction: INBOUND
      IpAddresses:
        - Ip: 10.1.3.250
          SubnetId: !Ref SeoulPrivateSN1
        - Ip: 10.1.4.250
          SubnetId: !Ref SeoulPrivateSN2
      SecurityGroupIds:
        - !Ref SeoulVPCSG
      Tags:
        - Key: Name
          Value: idc-to-aws-inbound
          
  OutboundEP:    #아웃바운드 설정 
    Type: AWS::Route53Resolver::ResolverEndpoint
    Properties:
      Direction: OUTBOUND
      IpAddresses:
        - Ip: 10.1.3.251
          SubnetId: !Ref SeoulPrivateSN1
        - Ip: 10.1.4.251
          SubnetId: !Ref SeoulPrivateSN2
      SecurityGroupIds:
        - !Ref SeoulVPCSG
      Tags:
        - Key: Name
          Value: aws-to-idc-outbound
          
  ForwardRule:    # 포워드 규칙 설정 
    Type: AWS::Route53Resolver::ResolverRule
    Properties:
      DomainName: idcseoul.internal
      Name: AWS-To-IDC-ForwardRule
      ResolverEndpointId: !Ref OutboundEP
      RuleType: FORWARD
      TargetIps:
        - Ip: 10.2.1.200
          Port: 53
      
  ResolverRuleAssociation:    #규칙관계
    Type: AWS::Route53Resolver::ResolverRuleAssociation
    Properties:
      Name: Resolver-Rule-Association
      ResolverRuleId: !Ref ForwardRule
      VPCId: !Ref SeoulVPC

######################################## TGW <-> VPC 
  TransitGateway1:     #AWS Transit Gateway 생성
    Type: AWS::EC2::TransitGateway
    Properties:
      DefaultRouteTableAssociation: disable     #기본 라우팅 테이블 생성하는거 비활성화 하는 코드
      DefaultRouteTablePropagation: disable     #기본 전파하는 부분 비활성화 하는 코드
      Tags:
        - Key: Name
          Value: TGW1

  TransitGatewayAtt1:     #TGW 연결 생성 1 VPC랑 연결
    Type: AWS::EC2::TransitGatewayAttachment
    DependsOn: SeoulVPC
    Properties:
      VpcId: !Ref SeoulVPC
      SubnetIds:
        - !Ref SeoulPrivateSN3
        - !Ref SeoulPrivateSN4
      TransitGatewayId: !Ref TransitGateway1
      Tags:
        - Key: Name
          Value: TGW-ATT1-VPC0
          
  TransitGatewayRT1:     #TGW 라우팅테이블 생성 
    Type: AWS::EC2::TransitGatewayRouteTable
    Properties:
      TransitGatewayId: !Ref TransitGateway1
      Tags:
        - Key: Name
          Value: TGW1-RT1
          
  TransitATTRT1:     #TGW와 TGW RT 연결 
    Type: AWS::EC2::TransitGatewayRouteTableAssociation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt1
      TransitGatewayRouteTableId: !Ref TransitGatewayRT1
      
  TransitRTPropagation1:     # TGW 라우팅테이블1에 연결1 라우팅경로 전파
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt1
      TransitGatewayRouteTableId: !Ref TransitGatewayRT1
      
  IDCRoute1:     # 라우팅테이블 경로 추가
    Type: AWS::EC2::Route
    DependsOn: IDCCGWEC2
    Properties:
      RouteTableId: !Ref IDCRT
      DestinationCidrBlock: 10.1.0.0/16
      NetworkInterfaceId: !Ref IDCCGWENI    
      
##############################TGW <-> VPN
  IDCCGW:     # 온프레미스(IDC) VPN 장비를 Customer Gateway로 등록
    Type: AWS::EC2::CustomerGateway
    Properties:
      Type: ipsec.1
      BgpAsn: 65010
      IpAddress: !GetAtt CGWEIP.PublicIp    
      Tags:
        - Key: Name
          Value: IDC-VPN-CGW
          
  VPCAWSVpnConnection:     #TGW와 온프레미스 간 IPsec VPN 터널 생성
    Type: AWS::EC2::VPNConnection
    Properties:
      Type: ipsec.1
      CustomerGatewayId: !Ref IDCCGW
      TransitGatewayId: !Ref TransitGateway1     #TransitGateway로 설정
      VpnTunnelOptionsSpecifications:
        - PreSharedKey: cloudneta
          TunnelInsideCidr: 169.254.178.132/30
        - PreSharedKey: cloudneta
          TunnelInsideCidr: 169.254.154.168/30
      Tags:
        - Key: Name
          Value: AWS-VPNConnection-IDC
          
          

      
            
    
Outputs:     #각 EC2 Public&Private IP 추출
  SeoulPublicEC21:
    Description: PUBLIC IP of SeoulPublicEC21
    Value: !GetAtt SeoulPublicEC21.PublicIp
  SeoulPublicEC22:
    Description: PUBLIC IP of SeoulPublicEC22
    Value: !GetAtt SeoulPublicEC22.PublicIp
  IDCDNSSRV:
    Description: PUBLIC IP of IDCDNSSRV
    Value: !GetAtt IDCDNSSRV.PublicIp
  IDCDBSRV:
    Description: PUBLIC IP of IDCDBSRV
    Value: !GetAtt IDCDBSRV.PublicIp
  IDCCGWEC2:
    Description: PUBLIC IP of IDCCGWEC2
    Value: !GetAtt IDCCGWEC2.PublicIp