    # Properties:
      # Domain: vpc    
      
Outputs:     #각 EC2 Public&Private IP 추출
  PublicEC2Public:
    Description: Public IP
    Value: !GetAtt NATInstancePublicEc2.PublicIp
  # PublicEC2Private:
    # Description: Private IP
    # Value: !GetAtt NATInstancePublicEc22.PrivateIp
  PrivateEC21:
    Description: Private IP 1-1
    Value: !GetAtt NATInstancePrivateEc21.PrivateIp
  PrivateEC22:
    Description: Private IP 3-1
    Value: !GetAtt NATInstancePrivateEc22.PrivateIp