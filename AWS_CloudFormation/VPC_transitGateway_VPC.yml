          Value: TGW-VPC1-SN4

  VPC1RT1:     #VPC0RT1
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref TGWVPC1
      Tags:
        - Key: Name
          Value: VPC1-RT1      
          
  # VPC0Route:     #VPC0RT1에 기본 인터넷 경로 추가
    # Type: AWS::EC2::Route
    # DependsOn: TGWIGWAttachment     #TGWIGWAttachment 먼저 생성된 후 만들어지도록 순서 지정해주는 부분
    # Properties:
      # RouteTableId: !Ref VPC0RT1
