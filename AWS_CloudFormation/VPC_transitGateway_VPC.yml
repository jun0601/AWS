          GroupSet:
            - !Ref VPC1SG1
          PrivateIpAddress: 10.10.2.10     # 사설 IP 직접 할당 
      UserData:     #인스턴스 시작 시 자동으로 실행할 스크립트 root계정 비밀번호 설정후 SSH설정 변경 후 재시작
