    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref TGWVPC1
      Tags:
        - Key: Name
          Value: VPC1-RT2
  
  VPC1RouteTableAssociation1:     #TGWVPC1SN1 라우팅테이블 연결 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VPC1RT1
      SubnetId: !Ref TGWVPC1SN1
      
  VPC1RouteTableAssociation2:     #TGWVPC1SN2 라우팅테이블 연결 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VPC1RT1
      SubnetId: !Ref TGWVPC1SN2
      
  VPC1RouteTableAssociation3:     #TGWVPC1SN3 라우팅테이블 연결 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VPC1RT2
      SubnetId: !Ref TGWVPC1SN3
      
  VPC1RouteTableAssociation4:     #TGWVPC0SN4 라우팅테이블 연결 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VPC1RT2
      SubnetId: !Ref TGWVPC1SN4
      
      
  VPC1SG1:     #보안그룹 하나 생성
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access via port 80 and SSH access via port 22
      VpcId: !Ref TGWVPC1
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: '80'
          ToPort: '80'
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp     #icmp는 포트가 없으므로 지정 안함
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
          

  VPC1Instance1:     #VPC1 EC2 인스턴스 생성
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: VPC1Instance1
      NetworkInterfaces:     #ENI를 정의하는 구조
        - DeviceIndex: 0
          SubnetId: !Ref TGWVPC1SN1
          GroupSet:
            - !Ref VPC1SG1
          PrivateIpAddress: 10.10.1.10     # 사설 IP 직접 할당 
      UserData:     #인스턴스 시작 시 자동으로 실행할 스크립트 root계정 비밀번호 설정후 SSH설정 변경 후 재시작
        Fn::Base64:
          !Sub |
            #!/bin/bash
            (
            echo "qwe123"
            echo "qwe123"
            ) | passwd --stdin root
            sed -i "s/^PasswordAuthentication no/PasswordAuthentication yes/g" /etc/ssh/sshd_config     #SSH 비밀번호 로그인 허용
            sed -i "s/^#PermitRootLogin prohibit-password/PermitRootLogin yes/g" /etc/ssh/sshd_config     #root 계정 SSH 로그인 허용
            service sshd restart     #SSH 서비스 재시작
          
  VPC1Instance2:     #VPC1 EC2 인스턴스 생성
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
