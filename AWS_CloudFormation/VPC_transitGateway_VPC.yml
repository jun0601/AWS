Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: must be the name of an existing EC2 KeyPair.
  LatestAmiId:
    Description: (DO NOT CHANGE)
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'
    AllowedValues:
      - /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64 

Resources:
  TGWVPC0:     #가상 네트워크 공간 생성 VPC0
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: TGW-VPC0
          
  TGWVPC1:     #가상 네트워크 공간 생성 VPC1
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: 10.10.0.0/16
      Tags:
        - Key: Name
          Value: TGW-VPC1
          
  TGWVPC2:     #가상 네트워크 공간 생성 VPC2
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: 10.20.0.0/16
      Tags:
        - Key: Name
          Value: TGW-VPC2
          
  TGWVPC0IGW:     #VPC0를 인터넷과 연결하는 출입문
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: TGW-VPC0-IGW
          
  TGWIGWAttachment:     #IGW를 VPC에 실제로 연결
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref TGWVPC0IGW
      VpcId: !Ref TGWVPC0

#######################VPC0############################
  
  TGWVPC0SN1:     #VPC0 Public 서브넷 생성 1 
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref TGWVPC0
      AvailabilityZone: !Select [ 0, !GetAZs '' ]     #현재 리전의 첫 번째 AZ 목록 반환 (가용 영역 A)
      CidrBlock: 10.0.1.0/24
      Tags:
        - Key: Name
          Value: TGW-VPC0-SN1
          
  TGWVPC0SN2:     #VPC0 Public 서브넷 생성 2
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref TGWVPC0
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.0.2.0/24
      Tags:
        - Key: Name
          Value: TGW-VPC0-SN2

  TGWVPC0SN3:     #연동용 VPC0 서브넷3
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref TGWVPC0
      AvailabilityZone: !Select [ 0, !GetAZs '' ] 
      CidrBlock: 10.0.3.0/24
      Tags:
        - Key: Name
          Value: TGW-VPC0-SN3
          
  TGWVPC0SN4:     #연동용 VPC0 서브넷4
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref TGWVPC0
      AvailabilityZone: !Select [ 2, !GetAZs '' ] 
      CidrBlock: 10.0.4.0/24
      Tags:
        - Key: Name
          Value: TGW-VPC0-SN4

  VPC0RT1:     #VPC0RT1
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref TGWVPC0
      Tags:
        - Key: Name
          Value: VPC0-RT1
          
  VPC0Route:     #VPC0RT1에 기본 인터넷 경로 추가
    Type: AWS::EC2::Route
    DependsOn: TGWIGWAttachment     #TGWIGWAttachment 먼저 생성된 후 만들어지도록 순서 지정해주는 부분
    Properties:
      RouteTableId: !Ref VPC0RT1
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref TGWVPC0IGW
      
  VPC0RT2:     #연동용 서브넷 RT
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref TGWVPC0
      Tags:
        - Key: Name
          Value: VPC0-RT2
  
  VPC0RouteTableAssociation1:     #TGWVPC0SN1 라우팅테이블 연결 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VPC0RT1
      SubnetId: !Ref TGWVPC0SN1
      
  VPC0RouteTableAssociation2:     #TGWVPC0SN2 라우팅테이블 연결 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VPC0RT1
      SubnetId: !Ref TGWVPC0SN2
      
  VPC0RouteTableAssociation3:     #TGWVPC0SN3 라우팅테이블 연결 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VPC0RT2
      SubnetId: !Ref TGWVPC0SN3
      
  VPC0RouteTableAssociation4:     #TGWVPC0SN4 라우팅테이블 연결 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VPC0RT2
      SubnetId: !Ref TGWVPC0SN4
      
      
  VPC0SG1:     #보안그룹 하나 생성
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access via port 80 and SSH access via port 22
      VpcId: !Ref TGWVPC0
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: '80'
          ToPort: '80'
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: '443'
          ToPort: '443'
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: '3128'
          ToPort: '3128'
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: '22'
          ToPort: '22'
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp     #icmp는 포트가 없으므로 지정 안함
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  VPC0Instance1:     #VPC0 EC2 인스턴스 생성
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: VPC0Instance1
      NetworkInterfaces:     #ENI를 정의하는 구조
        - DeviceIndex: 0
          SubnetId: !Ref TGWVPC0SN1
          GroupSet:
            - !Ref VPC0SG1
          AssociatePublicIpAddress: true     #공인IP할당
          PrivateIpAddress: 10.0.1.10     # 사설 IP 직접 할당 
      UserData:
        Fn::Base64: |
          #!/bin/bash
          hostnamectl --static set-hostname VPC0Instance1
          cat <<EOT >> /etc/profile.d/prompt.sh
          export PS1="[\[\e[1;31m\]\u\[\e[m\]@\[\e[1;32m\]\h\[\e[m\]: \[\e[1;36m\]\w\[\e[m\]]#"
          EOT
          source /etc/profile
          dnf install -y tcpdump squid
          cat <<EOT> /etc/squid/squid.conf
          http_port 3128
          acl all src 0.0.0.0/0
          http_access allow all
          http_access deny all
          EOT
          systemctl start squid && systemctl enable squid
          cat <<EOT> /home/ec2-user/list.txt
          10.0.1.10
          10.10.1.10
          10.10.2.10
          10.20.1.10
          10.20.2.10
          EOT
          dnf install httpd -y
          systemctl start httpd && systemctl enable httpd
          echo "<h1>TGW Lab - MgMt Server1</h1>" > /var/www/html/index.html
          curl -o /home/ec2-user/pingall.sh https://cloudneta-book.s3.ap-northeast-2.amazonaws.com/chapter6/pingall.sh --silent
          cp /home/ec2-user/pingall.sh /var/www/html/pingall.sh
          cp /home/ec2-user/list.txt /var/www/html/list.txt
          chmod +x /home/ec2-user/pingall.sh
          
  VPC0CloudFormationEndpoint:     # VPC0 subnet1,2에 CloudFormation에 대한 VPC 엔드포인트 생성
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref TGWVPC0
      VpcEndpointType: Interface
      ServiceName: !Sub com.amazonaws.${AWS::Region}.cloudformation
      SubnetIds:
        - !Ref TGWVPC0SN1
        - !Ref TGWVPC0SN2
      SecurityGroupIds:
        - !Ref VPC0SG1
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: VPC0-CloudFormation-Endpoint
          
#################################VPC0############################################

#######################VPC1############################
  
  TGWVPC1SN1:     #VPC1 Public 서브넷 생성 1 
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref TGWVPC1
      AvailabilityZone: !Select [ 0, !GetAZs '' ]     #현재 리전의 첫 번째 AZ 목록 반환 (가용 영역 A)
      CidrBlock: 10.10.1.0/24
      Tags:
        - Key: Name
          Value: TGW-VPC1-SN1
          
  TGWVPC1SN2:     #VPC1 Public 서브넷 생성 2
