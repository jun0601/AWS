  #TGW Resource 추가
  TransitGateway1:     #AWS Transit Gateway 생성
    Type: AWS::EC2::TransitGateway
    Properties:
      DefaultRouteTableAssociation: disable
      DefaultRouteTablePropagation: disable
      Tags:
        - Key: Name
          Value: TGW1
  
  TransitGatewayAtt1:     #TGW 연결 생성 1
    Type: AWS::EC2::TransitGatewayAttachment
    DependsOn: TGWVPC0
    Properties:
      VpcId: !Ref TGWVPC0
      SubnetIds:
        - !Ref TGWVPC0SN3
        - !Ref TGWVPC0SN4
      TransitGatewayId: !Ref TransitGateway1
      Tags:
        - Key: Name
          Value: TGW-ATT1-VPC0
          
  TransitGatewayAtt2:     #TGW 연결 생성 2
    Type: AWS::EC2::TransitGatewayAttachment
    DependsOn: TGWVPC1
    Properties:
      VpcId: !Ref TGWVPC1
      SubnetIds:
        - !Ref TGWVPC1SN3
        - !Ref TGWVPC1SN4
      TransitGatewayId: !Ref TransitGateway1
      Tags:
        - Key: Name
          Value: TGW-ATT2-VPC1
          
    
  TransitGatewayAtt3:     #TGW 연결 생성 3
    Type: AWS::EC2::TransitGatewayAttachment
    DependsOn: TGWVPC2
    Properties:
      VpcId: !Ref TGWVPC2
      SubnetIds:
        - !Ref TGWVPC2SN3
        - !Ref TGWVPC2SN4
      TransitGatewayId: !Ref TransitGateway1
      Tags:
        - Key: Name
          Value: TGW-ATT3-VPC2
          
  TransitGatewayRT1:
    Type: AWS::EC2::TransitGatewayRouteTable
    Properties:
      TransitGatewayId: !Ref TransitGateway1
      Tags:
        - Key: Name
          Value: TGW1-RT1
          
  TransitATTRT1:     #라우팅 테이블에 연결 1 
    Type: AWS::EC2::TransitGatewayRouteTableAssociation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt1
      TransitGatewayRouteTableId: !Ref TransitGatewayRT1
      
  # TransitATTRT2:     #라우팅 테이블에 연결 2 
    # Type: AWS::EC2::TransitGatewayRouteTableAssociation
    # Properties:
      # TransitGatewayAttachmentId: !Ref TransitGatewayAtt2
      # TransitGatewayRouteTableId: !Ref TransitGatewayRT1
      
  # TransitATTRT3:     #라우팅 테이블에 연결 3 
    # Type: AWS::EC2::TransitGatewayRouteTableAssociation
    # Properties:
      # TransitGatewayAttachmentId: !Ref TransitGatewayAtt3
      # TransitGatewayRouteTableId: !Ref TransitGatewayRT1
          
  TransitRTPropagation1:     # TGW 라우팅테이블1에 연결1 라우팅경로 전파
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt1
      TransitGatewayRouteTableId: !Ref TransitGatewayRT1
      
  TransitRTPropagation2:     # TGW 라우팅테이블1에 연결2 라우팅경로 전파
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt2
      TransitGatewayRouteTableId: !Ref TransitGatewayRT1

  TransitRTPropagation3:     # TGW 라우팅테이블1에 연결3 라우팅경로 전파
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt3
      TransitGatewayRouteTableId: !Ref TransitGatewayRT1

  VPC0Route2:     # 라우팅테이블 경로 추가
    Type: AWS::EC2::Route
    DependsOn: TransitGatewayAtt1
    Properties:
      RouteTableId: !Ref VPC0RT1
      DestinationCidrBlock: 10.0.0.0/8
      TransitGatewayId: !Ref TransitGateway1
      
  VPC1Route2:     # 라우팅테이블 경로 추가
    Type: AWS::EC2::Route
    DependsOn: TransitGatewayAtt2
    Properties:
      RouteTableId: !Ref VPC1RT1
      DestinationCidrBlock: 10.0.0.0/8
      TransitGatewayId: !Ref TransitGateway1
      
  VPC2Route2:     # 라우팅테이블 경로 추가
    Type: AWS::EC2::Route
    DependsOn: TransitGatewayAtt3
    Properties:
      RouteTableId: !Ref VPC2RT1
      DestinationCidrBlock: 10.0.0.0/8
      TransitGatewayId: !Ref TransitGateway1
      

  BlueRT:     # Blue-RT, Red-RT 생성
    Type: AWS::EC2::TransitGatewayRouteTable
    Properties:
      Tags:
        - Key: Name
          Value: TGW-Blue-RT
      TransitGatewayId: !Ref TransitGateway1
      
  RedRT:
    Type: AWS::EC2::TransitGatewayRouteTable
    Properties:
      Tags:
        - Key: Name
          Value: TGW-Red-RT
      TransitGatewayId: !Ref TransitGateway1


  BlueAtt2Association:     # Blue - Att2, Red - Att3 연결
    Type: AWS::EC2::TransitGatewayRouteTableAssociation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt2
      TransitGatewayRouteTableId: !Ref BlueRT
  RedAtt3Association:
    Type: AWS::EC2::TransitGatewayRouteTableAssociation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt3
      TransitGatewayRouteTableId: !Ref RedRT
  

  BlueRTPropagation1:     # Blue 라우팅 테이블에 Att1, Att2 전파 추가
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt2
      TransitGatewayRouteTableId: !Ref BlueRT
  BlueRTPropagation2:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt1
      TransitGatewayRouteTableId: !Ref BlueRT


  RedRTPropagation1:       # Red 라우팅 테이블에 Att1, Att3 전파 추가
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt3
      TransitGatewayRouteTableId: !Ref RedRT
  RedRTPropagation2:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref TransitGatewayAtt1
      TransitGatewayRouteTableId: !Ref RedRT
      
  BlackholeRt:    # 블랙홀 설정 
    Type: AWS::EC2::TransitGatewayRoute
    Properties:
      Blackhole: true
      DestinationCidrBlock: 10.20.2.0/24
      TransitGatewayRouteTableId: !Ref TransitGatewayRT1
      
   
Outputs:     #각 EC2 Public&Private IP 추출
  VPC0Instance1:
    Description: PUBLIC IP of VPC0Instance1
    Value: !GetAtt VPC0Instance1.PublicIp
  VPC1Instance1:
    Description: PrivateIp IP of VPC1Instance1
    Value: !GetAtt VPC1Instance1.PrivateIp
  VPC1Instance2:
    Description: PrivateIp IP of VPC1Instance2
    Value: !GetAtt VPC1Instance2.PrivateIp
  VPC2Instance1:
    Description: PrivateIp IP of VPC2Instance1
    Value: !GetAtt VPC2Instance1.PrivateIp
  VPC2Instance2:
    Description: PrivateIp IP of VPC2Instance2
    Value: !GetAtt VPC2Instance2.PrivateIp